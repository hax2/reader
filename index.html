<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spanish Listening Reader</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" data-view="library">
      <section class="library-panel screen" aria-labelledby="library-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Spanish Listening Reader</p>
            <h1 id="library-title">Read with the audio</h1>
          </div>
        </div>
        <div id="trackList" class="track-list" aria-live="polite"></div>
      </section>

      <section class="reader-view screen" aria-labelledby="app-title">
      <section class="listen-panel player-expanded" aria-labelledby="app-title">
        <div class="listen-panel-inner">
          <div class="timeline-wrap">
            <div class="waveform-container">
              <canvas id="waveform" width="900" height="20" aria-hidden="true"></canvas>
              <input id="seek" class="seek" type="range" min="0" max="0" step="0.01" value="0" disabled aria-label="Seek">
            </div>
          </div>

          <div class="player-strip">
            <div class="player-left">
              <button id="backToLibrary" class="utility-button" type="button" aria-label="Back to readings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              </button>
              <div class="title-wrap">
                <h1 id="app-title">Pick a reading above</h1>
              </div>
            </div>
            
            <div class="player-center">
              <button id="playPause" class="play-button" type="button" aria-label="Play or pause" disabled>
                <span id="playIcon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </span>
              </button>
            </div>
            
            <div class="player-right">
              <div class="time-readout">
                <span id="currentTime" class="time-readout-inline">0:00</span>
                <span class="time-divider">/</span>
                <span id="duration" class="time-readout-inline">0:00</span>
              </div>
              
              <div class="study-actions-compact">
                <span id="studyCount" class="muted hidden-mobile">0 looked-up words</span>
                <button id="downloadAnki" class="utility-button" type="button" aria-label="Download Anki cards" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
              </div>

              <details id="settingsMenu" class="settings-menu">
                <summary aria-label="Settings">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </summary>
                <div class="appearance-controls">
                  <label>
                    <span>Theme</span>
                    <select id="themeSelect">
                      <option value="system">System</option>
                      <option value="paper">Paper</option>
                      <option value="mist">Mist</option>
                      <option value="night">Night</option>
                    </select>
                  </label>
                  <label>
                    <span>Highlight</span>
                    <select id="highlightSelect">
                      <option value="sage">Sage wash</option>
                      <option value="sky">Sky wash</option>
                      <option value="rose">Rose wash</option>
                      <option value="underline">Underline</option>
                    </select>
                  </label>
                </div>
              </details>
              
              <!-- Hidden to avoid app.js errors -->
              <button id="expandPlayer" class="hidden" type="button" aria-hidden="true"></button>
              <button id="collapsePlayerInline" class="hidden" type="button" aria-hidden="true"></button>
            </div>
          </div>
          
          <audio id="audio" preload="metadata"></audio>
        </div>
      </section>

      <section class="workspace">
        <section class="reader-shell" aria-label="Transcript reader">
          <div id="status" class="status">Choose a hosted reading to begin.</div>
          <article id="reader" class="reader" lang="es"></article>
        </section>

        <aside class="side-panel" aria-label="Reading tools">
          <div class="tool-block compact">
            <h2>Word</h2>
            <div id="definition" class="definition">
              <p class="muted">Tap a word for an English meaning.</p>
            </div>
          </div>

          <details class="manual-tools">
            <summary>Import</summary>
            <div class="import-grid">
              <label class="file-pick">
                <span>Audio</span>
                <input id="audioFile" type="file" accept="audio/*,.m4a">
              </label>
              <label class="file-pick">
                <span>Transcript</span>
                <input id="transcriptFile" type="file" accept=".json,.vtt,.srt,.txt,text/plain,application/json">
              </label>
            </div>
            <div class="tool-block">
              <textarea id="pasteTranscript" rows="7" placeholder="Paste Spanish text"></textarea>
              <button id="usePastedText" type="button">Use pasted text</button>
            </div>
          </details>
        </aside>
      </section>
      </section>
    </main>
    <div id="wordPopover" class="word-popover" role="status" aria-live="polite" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
